<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Probably AI</title>
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1>Probably AI</h1>
      </header>

      <section class="panel">
        <div class="toggle-stack">
          <label class="toggle-row" for="enabled-toggle">
            <span class="toggle-row__label">Detection enabled</span>
            <input id="enabled-toggle" type="checkbox" />
          </label>
          <label class="toggle-row" for="autohide-toggle">
            <span class="toggle-row__label">Auto-hide detected content</span>
            <input id="autohide-toggle" type="checkbox" />
          </label>
        </div>
      </section>

      <section class="panel">
        <form id="add-rule-form" class="rule-form">
          <fieldset class="match-type-group">
            <legend class="sr-only">Rule type</legend>
            <label class="match-type-option" for="match-type-literal">
              <input id="match-type-literal" name="match-type" type="radio" value="literal" checked />
              <span>Literal phrase</span>
            </label>
            <label class="match-type-option" for="match-type-regex">
              <input id="match-type-regex" name="match-type" type="radio" value="regex" />
              <span>Regex</span>
            </label>
          </fieldset>
          <textarea
            id="pattern-input"
            rows="3"
            placeholder="Example: changes everything"
          ></textarea>
          <p id="form-error" class="error" hidden></p>
          <button id="add-rule-button" type="submit">Add rule</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>Rules</h2>
          <div class="panel__actions">
            <button id="reset-defaults" type="button" class="ghost-button">
              Reset defaults
            </button>
            <div id="reset-confirmation" class="reset-confirmation" hidden>
              <span class="reset-confirmation__text">Reset all rules?</span>
              <button id="reset-confirm-yes" type="button" class="ghost-button reset-confirmation__button">
                Yes
              </button>
              <button id="reset-confirm-no" type="button" class="ghost-button reset-confirmation__button">
                No
              </button>
            </div>
          </div>
        </div>
        <ul id="rule-list" class="rule-list"></ul>
      </section>
    </main>

    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
